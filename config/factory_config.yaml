# Factory Guardian Configuration
# Edit this file to configure your factory monitoring setup

factory:
  name: "Production Line A"
  location: "Building 3, Bay 7"
  timezone: "America/New_York"
  shift_schedule:
    day_shift: "06:00-14:00"
    swing_shift: "14:00-22:00"
    night_shift: "22:00-06:00"

cameras:
  - id: "cam_01"
    name: "CNC Area North"
    type: "rpi_camera_v3"
    resolution: [1920, 1080]
    fps: 15
    night_mode: true
    recording: true
    retention_days: 14
  - id: "cam_02"
    name: "Loading Dock"
    type: "usb_webcam"
    resolution: [1280, 720]
    fps: 10
    night_mode: false
    recording: true
    retention_days: 7

machines:
  - id: "cnc_mill_01"
    name: "CNC Mill Station 1"
    type: "cnc_mill"
    nominal_rpm: 3000
    sensors:
      vibration:
        pin: 17
        spi_bus: 0
        spi_cs: 0
        threshold: 2.5
        unit: "g"
      temperature:
        pin: 4
        threshold: 75
        unit: "°C"
      current:
        pin: 0
        max_current: 30
        threshold: 12.0
        unit: "A"
    camera: "cam_01"
    alert_recipients:
      telegram_groups: ["-1002003004005"]
      email: ["shift-lead@factory.com"]

  - id: "cnc_mill_02"
    name: "CNC Mill Station 2"
    type: "cnc_mill"
    nominal_rpm: 3000
    sensors:
      vibration:
        pin: 27
        spi_bus: 0
        spi_cs: 1
        threshold: 2.5
        unit: "g"
      temperature:
        pin: 4
        threshold: 75
        unit: "°C"
      current:
        pin: 1
        max_current: 30
        threshold: 12.0
        unit: "A"
    camera: "cam_01"

  - id: "conveyor_a"
    name: "Main Conveyor"
    type: "conveyor"
    nominal_rpm: 60
    sensors:
      vibration:
        pin: 22
        threshold: 1.0
        unit: "g"
      temperature:
        pin: 4
        threshold: 45
        unit: "°C"
      current:
        pin: 2
        max_current: 15
        threshold: 8.0
        unit: "A"
    camera: "cam_02"

  - id: "press_brake_01"
    name: "Press Brake Station"
    type: "press_brake"
    nominal_rpm: 0
    sensors:
      vibration:
        pin: 23
        threshold: 3.5
        unit: "g"
      temperature:
        pin: 4
        threshold: 70
        unit: "°C"
      current:
        pin: 3
        max_current: 50
        threshold: 35.0
        unit: "A"
    camera: "cam_01"

# Vision monitoring zones (pixel coordinates relative to camera resolution)
zones:
  - camera_id: "cam_01"
    name: "restricted_zone"
    x1: 0
    y1: 0
    x2: 320
    y2: 360
    sensitivity: 0.85
    restricted: true
    min_contour_area: 200
  - camera_id: "cam_01"
    name: "work_area"
    x1: 320
    y1: 0
    x2: 1600
    y2: 1080
    sensitivity: 0.6
    restricted: false
    min_contour_area: 500
  - camera_id: "cam_02"
    name: "entrance"
    x1: 0
    y1: 0
    x2: 640
    y2: 720
    sensitivity: 0.7
    restricted: false
    min_contour_area: 300

# Alert routing configuration
alert_routing:
  channels:
    telegram:
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      shift_groups:
        day_shift: "${TELEGRAM_DAY_GROUP}"
        swing_shift: "${TELEGRAM_SWING_GROUP}"
        night_shift: "${TELEGRAM_NIGHT_GROUP}"
    slack:
      webhook_url: "${SLACK_WEBHOOK_URL}"
    email:
      smtp_host: "smtp.gmail.com"
      smtp_port: 587
      recipients:
        shift_leads: ["shift-lead@factory.com"]
        engineers: ["maintenance@factory.com", "plant-mgr@factory.com"]

  grouping:
    merge_window_seconds: 300
    max_repeats_before_escalation: 3

  escalation:
    emergency_buzzer_pin: 23

# Anomaly detection settings
anomaly_detection:
  learning_period_hours: 72
  z_score_thresholds:
    warning: 2.0
    critical: 3.0
    emergency: 4.0
  correlation_window_minutes: 30
  rebase_trigger_false_positives: 5

# Vibration analysis settings
vibration_baseline:
  sampling:
    rate_hz: 3200
    window_seconds: 2
    windows_per_average: 5
  fft:
    max_frequency_hz: 1600
    window_function: "hanning"
  trending:
    rolling_windows: [7, 14, 30]

# Camera monitoring settings
camera_monitor:
  motion_detection:
    background_history: 500
    variance_threshold: 50
    shadow_detection: true
  yolo:
    model: "yolov8n.pt"
    confidence_threshold: 0.5
    target_classes: ["person", "truck", "car", "motorcycle", "bus"]
  archival:
    clip_before_seconds: 30
    clip_after_seconds: 120
    retention_days: 14
    storage_path: "/data/footage/"

# Shift report settings
shift_report:
  schedule:
    shift_change_report: true
    daily_summary_hour: 22
    weekly_digest_day: "monday"
  delivery:
    shift_handover: ["telegram", "slack"]
    daily_summary: ["email"]
    weekly_digest: ["email", "slack"]
